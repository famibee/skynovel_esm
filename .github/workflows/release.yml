name: "Publish npm"

on: push

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for npm provenance (OIDC)
      contents: write  # Required to create a GitHub Release

    steps:
    - name: 🔍 Debug ref
      run: |
        echo "github.ref=${{ github.ref }}"
        echo "github.ref_type=${{ github.ref_type }}"
        echo "github.ref_name=${{ github.ref_name }}"
        echo "github.event_name=${{ github.event_name }}"
        echo "startsWith-check=${{ startsWith(github.ref, 'refs/tags/v') }}"

    - name: 📥 Checkout
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

    - name: 🔧 Setup bun
      if: startsWith(github.ref, 'refs/tags/v')
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

    - name: 🔧 Get node_modules cache
      if: startsWith(github.ref, 'refs/tags/v')
      id: cache-restore
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: node_modules
        key: ${{runner.os}}-bun-${{hashFiles('bun.lock')}}
    - name: 📦 Install dependencies
      if: startsWith(github.ref, 'refs/tags/v') && steps.cache-restore.outputs.cache-hit != 'true'
      run: bun install --frozen-lockfile

    - name: 🔎 Test
      if: startsWith(github.ref, 'refs/tags/v')
      run: bun test

    - name: 🔧 Setup node 4 npm publish
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 'lts/*'

    - name: 🚀 Publish to npm
      if: startsWith(github.ref, 'refs/tags/v')
      run: npm publish --access public

    - name: 🏷️ Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090 # v2.4.1
      with:
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
