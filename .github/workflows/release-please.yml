name: "release-please"

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
    - name: 🔑 Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
        private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

    - name: 📜 Release Please
      id: release
      uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
      with:
        token: ${{ steps.app-token.outputs.token }}
        config-file: release-please-config.json
        manifest-file: .release-please-manifest.json

    - name: 🔀 Enable auto-merge on Release PR（レビュー通過後に自動マージ）
      if: ${{ steps.release.outputs.release_created != 'true' }}
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        PR_NUMBER=$(gh pr list -R famibee/skynovel_esm --label "autorelease: pending" --state open --json number --jq '.[0].number')
        if [ -n "$PR_NUMBER" ]; then
          gh pr merge -R famibee/skynovel_esm --auto --squash "$PR_NUMBER"
        fi
